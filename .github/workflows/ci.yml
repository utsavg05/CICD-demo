name: Node.js CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        
      - name: Run lint
        run: npm run lint
        
      - name: Build Docker image
        run: docker build -t cicd-demo .
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Tag image
        run: docker tag cicd-demo ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
      
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
            docker stop app1 || true
            docker rm app || true
            docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest    