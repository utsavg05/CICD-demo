name: Node.js CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        
      - name: Run lint
        run: npm run lint
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Deploy
        run: echo "Deploying app 🚀"      